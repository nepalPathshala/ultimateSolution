    <style>
        /* Hide scrollbar technique - only main scrolls, body static */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden !important;
            overscroll-behavior-y: none; /* prevent rubber-banding gap on mobile */
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #1a202c;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;

            display: flex;
            flex-direction: column;
            height: 100%;

        main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
            scroll-behavior: auto;
        }
        main::-webkit-scrollbar {
            display: none;

        /* Smart sticky header — improved transition and explicit top */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background-color: white;
            border-bottom: 1px solid #f0f0f0;
            transition: transform 0.3s ease-out; /* smoother, no bounce */

        .link-decoration:hover {

        }
        .title-underline {
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 6px;
        }
        .aspect-16-9 {
            aspect-ratio: 16 / 9;
            width: 100%;
        }
        .clickable-title {
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        .clickable-title:hover {
            opacity: 0.85;
        }
        .toast-notification {
            transition: opacity 0.25s ease-in-out, visibility 0.25s;
            opacity: 0;
            visibility: hidden;
            backdrop-filter: blur(4px);
        }
        .toast-notification.show {
            opacity: 1;
            visibility: visible;

            justify-content: center;

            padding: 3rem 1rem;

        .loader-dot:nth-child(3) { animation-delay: 0.4s; }

            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        /* Custom dropdown styles — UPDATED: dark blue trigger, black dropdown */
        .custom-select-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 1.5rem;
        }
        .custom-select-trigger {

            color: #e2e8f0;

            margin-left: 12px;
            flex-shrink: 0;

        .custom-select-trigger.open::after {
            transform: rotate(180deg);

        .custom-select-dropdown {

            top: calc(100% + 4px);
            left: 0;
            width: 100%;

            border-radius: 12px;

            overflow-y: auto;

            overflow: hidden;

        .main-content-wrapper {
            padding-top: 20px;

        .empty-posts-message {

        /* ---------- LOADING OVERLAY (integrated from reference) ---------- */
        .loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;

        /* Container for the brand and animation */
        .brand-wrapper {
            position: relative;
            padding: 0.8rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            overflow: hidden;
        }
        /* The travelling light progress indicator */
        .brand-wrapper::before {
            content: '';
            position: absolute;
            height: 400%; 
            width: 400%;
            background-image: conic-gradient(
                transparent, 
                transparent, 
                transparent, 
                #3b82f6
            );
            animation: rotate 1.5s linear infinite;
        }
        /* Mask to create the "hollow" travelling path */
        .brand-wrapper::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: white;
            border-radius: 10px;
            z-index: 1;
        }

        /* ======================== BROWSER DARK MODE OVERRIDES ======================== */
        @media (prefers-color-scheme: dark) {

            #dynamic-sections-container > section {

            }

                color: #60a5fa;
            }
            .link-decoration:hover {
                color: #93c5fd;
            }
            h2.text-3xl {
                color: #f1f5f9;
            }

                color: #cbd5e1;

                background-color: #1e293b !important;

    </style>

    <script>
        // ======================== FIREBASE CONFIG & INIT ========================
        const firebaseConfig = {

        firebase.initializeApp(firebaseConfig);

        // ======================== API CONFIGURATION ========================
        const API_BASE = "https://dilshadalmm-yosv.onrender.com";

        // --- READ CLASS, SUBJECT & TUTOR FROM URL PARAMETERS ---
        const urlParams = new URLSearchParams(window.location.search);
        let selectedClassId = urlParams.get('classId') || null;
        let selectedSubjectId = urlParams.get('subjectId') || null;
        let selectedTutorId = urlParams.get('tutorId') || null;   // Pre‑select tutor from URL

        let selectedChapterId = null;   // Chapter is optional, initially null

        // Pagination state
        let currentFeedMode = 'paginated'; // 'paginated' or 'filtered'
        let paginationCursor = null;
        let hasMorePosts = false;
        let isLoadingMore = false;
        const DEFAULT_LIMIT = 10;

        // DOM elements
        const filterContainer = document.getElementById('filterFormContainer');
        const postsContainer = document.getElementById('dynamic-sections-container');
        const scrollSentinel = document.getElementById('scrollSentinel');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // Loading overlay control
        let loadingMinTimePassed = false;
        let initialDataLoaded = false;

        // VIDEO PLAYER MANAGEMENT
        let activePlayersMap = new Map();
        let intersectionObserver = null;

        function resetVideoContainerToThumbnail(container) {
            if (!container || !container.dataset) return;
            const existingPlayer = activePlayersMap.get(container);
            if (existingPlayer && typeof existingPlayer.destroy === 'function') existingPlayer.destroy();
            activePlayersMap.delete(container);
            container.dataset.playerInitialized = "false";
            const videoUrl = container.dataset.videoUrl;
            const thumbnailUrl = container.dataset.thumbnailUrl;
            const postTitle = container.dataset.postTitle || "Video";
            if (!videoUrl) return;
            container.innerHTML = '';
            const thumbImg = document.createElement('img');
            const finalThumb = getVideoThumbnail(videoUrl, thumbnailUrl);
            thumbImg.src = finalThumb;
            thumbImg.alt = postTitle;
            thumbImg.className = "video-thumbnail";
            thumbImg.loading = "lazy";
            thumbImg.onerror = function() { if (!this.src.includes('placeholder-medical')) this.src = "https://images.unsplash.com/photo-1581091226033-d5c48150dbaa?q=80&w=1200&auto=format&fit=crop"; };
            container.appendChild(thumbImg);
            const svgPlay = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svgPlay.setAttribute("width", "90");
            svgPlay.setAttribute("height", "90");
            svgPlay.setAttribute("viewBox", "0 0 90 90");
            svgPlay.setAttribute("class", "play-button-overlay");
            svgPlay.innerHTML = '<path d="M85.3 24.5c-1-3.7-3.9-6.6-7.6-7.6C71 15 45 15 45 15s-26 0-32.7 1.9c-3.7 1-6.6 3.9-7.6 7.6C2.8 31.2 2.8 45 2.8 45s0 13.8 1.9 20.5c1 3.7 3.9 6.6 7.6 7.6C19 75 45 75 45 75s26 0 32.7-1.9c3.7-1 6.6-3.9 7.6-7.6 1.9-6.7 1.9-20.5 1.9-20.5s0-13.8-1.9-20.5z" fill="#3b82f6"/><path d="M36 58.5V31.5L59.5 45L36 58.5z" fill="white"/>';
            container.appendChild(svgPlay);
        }

        function destroyAllActivePlayersExcept(keepContainer) {
            for (let [container, player] of activePlayersMap.entries()) {
                if (container !== keepContainer) resetVideoContainerToThumbnail(container);
            }
        }

        function destroyAllPlayers() {
            for (let [container, player] of activePlayersMap.entries()) {
                if (player && typeof player.destroy === 'function') player.destroy();
            }
            activePlayersMap.clear();
        }

        // Helper functions
        function formatCreatedAt(createdAtValue) {
            if (!createdAtValue) return "Date not available";
            try {
                let seconds = null;
                if (typeof createdAtValue === 'object' && createdAtValue !== null) {
                    if ('_seconds' in createdAtValue && typeof createdAtValue._seconds === 'number') seconds = createdAtValue._seconds;
                    else if ('seconds' in createdAtValue && typeof createdAtValue.seconds === 'number') seconds = createdAtValue.seconds;
                } else if (typeof createdAtValue === 'number') seconds = createdAtValue;
                else if (typeof createdAtValue === 'string') {
                    const parsed = new Date(createdAtValue);
                    if (!isNaN(parsed.getTime())) return formatDateFromDateObj(parsed);
                    else return "Invalid date string";
                }
                if (seconds !== null && typeof seconds === 'number' && !isNaN(seconds)) {
                    const dateObj = new Date(seconds * 1000);
                    if (!isNaN(dateObj.getTime())) return formatDateFromDateObj(dateObj);
                    else return "Invalid date conversion";
                }
                return "Invalid date";
            } catch (e) { return "Date error"; }
        }

        function formatDateFromDateObj(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} || ${hours}:${minutes}:${seconds}`;
        }

        setTimeout(() => { loadingMinTimePassed = true; checkHideLoadingOverlay(); }, 2000);
        function checkHideLoadingOverlay() {
            if (loadingMinTimePassed && initialDataLoaded && loadingOverlay) {
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.style.display = 'none', 300);
            }
        }

        function showToast(message = "Coming Soon !!", isError = false) {
            const toastEl = document.getElementById('customToast');
            const messageSpan = document.getElementById('toastMessage');
            if (!toastEl) return;
            if (messageSpan) messageSpan.innerText = message;
            toastEl.classList.remove('bg-gradient-to-r', 'from-red-600', 'to-red-700', 'from-red-800', 'to-red-900');
            if (isError) toastEl.classList.add('bg-gradient-to-r', 'from-red-800', 'to-red-900');
            else toastEl.classList.add('bg-gradient-to-r', 'from-red-600', 'to-red-700');
            toastEl.classList.remove('show');
            void toastEl.offsetWidth;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 2500);
        }

        // -------------------- AUTH & FETCH HELPERS --------------------
        async function getAuthToken() {
            const user = auth.currentUser;
            if (!user) throw new Error('User not authenticated');
            return await user.getIdToken(/* forceRefresh */ true);
        }

        async function authenticatedFetch(url, options = {}) {
            try {
                const token = await getAuthToken();
                const headers = {
                    ...options.headers,
                    'Authorization': `Bearer ${token}`
                };
                const response = await fetch(url, { ...options, headers });
                if (response.status === 401 || response.status === 403) {
                    // Token invalid / expired → redirect to login
                    window.location.href = 'auth1.html';
                    throw new Error('Authentication required');
                }
                return response;
            } catch (error) {
                if (error.message === 'User not authenticated') {
                    window.location.href = 'auth1.html';
                }
                throw error;
            }
        }

        async function fetchJSON(url, errorMsg = "Network error") {
            try {
                const res = await authenticatedFetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (err) {
                console.error(`Fetch failed: ${url}`, err);
                showToast(errorMsg, true);
                return null;
            }
        }

        function buildCustomSelect(options, placeholder, selectedValue, onSelect) {
            const wrapper = document.createElement('div');
            wrapper.className = 'custom-select-wrapper';
            const trigger = document.createElement('div');
            trigger.className = 'custom-select-trigger';
            const triggerSpan = document.createElement('span');
            const selectedOption = options.find(opt => opt.value === selectedValue);
            triggerSpan.textContent = selectedOption ? selectedOption.label : placeholder;
            trigger.appendChild(triggerSpan);
            const dropdown = document.createElement('div');
            dropdown.className = 'custom-select-dropdown';
            if (!options.length) {
                const noOpt = document.createElement('div');
                noOpt.className = 'custom-select-option disabled';
                noOpt.textContent = 'No options available';
                noOpt.style.cursor = 'default';
                noOpt.style.opacity = '0.6';
                dropdown.appendChild(noOpt);
            } else {
                options.forEach(opt => {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'custom-select-option';
                    if (selectedValue === opt.value) optDiv.classList.add('selected');
                    optDiv.textContent = opt.label;
                    optDiv.addEventListener('click', (e) => {
                        e.stopPropagation();
                        triggerSpan.textContent = opt.label;
                        dropdown.classList.remove('show');
                        trigger.classList.remove('open');
                        onSelect(opt.value, opt.label);
                        dropdown.querySelectorAll('.custom-select-option').forEach(el => el.classList.remove('selected'));
                        optDiv.classList.add('selected');
                    });
                    dropdown.appendChild(optDiv);
                });
            }
            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                closeAllDropdowns();
                dropdown.classList.add('show');
                trigger.classList.add('open');
            });
            wrapper.appendChild(trigger);
            wrapper.appendChild(dropdown);
            return wrapper;
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.custom-select-dropdown').forEach(dd => dd.classList.remove('show'));
            document.querySelectorAll('.custom-select-trigger').forEach(tr => tr.classList.remove('open'));
        }

        // Reset to default paginated mode (preserves class/subject/tutor from URL, clears chapter)
        function resetToDefaultModeAndClearFilters() {
            selectedChapterId = null;
            currentFeedMode = 'paginated';
            paginationCursor = null;
            hasMorePosts = false;
            isLoadingMore = false;
            destroyAllPlayers();
            clearPosts();
            postsContainer.innerHTML = '<div class="loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>';
            fetchPaginatedPosts(null, false).then(() => {
                // Refresh dropdowns (chapter list, tutor stays selected)
                populateChapterSelect(true);
            });
        }

        function clearPosts() {
            destroyAllPlayers();
            postsContainer.innerHTML = '';
            if (currentFeedMode === 'paginated') {
                hasMorePosts = false;
                paginationCursor = null;
                loadingIndicator.style.display = 'none';
            }
        }

        function showEmptyPostsMessage() {
            destroyAllPlayers();
            postsContainer.innerHTML = '<div class="empty-posts-message">📚 No posts available for this tutor 📚</div>';
            loadingIndicator.style.display = 'none';
        }

        // YouTube helpers
        function initIntersectionObserver() {
            if (intersectionObserver) return;
            intersectionObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const container = entry.target;
                    const player = activePlayersMap.get(container);
                    if (player && typeof player.pauseVideo === 'function' && !entry.isIntersecting) player.pauseVideo();
                });
            }, { threshold: 0.2 });
        }
        function observeVideoContainer(containerEl) { if (!intersectionObserver) initIntersectionObserver(); intersectionObserver.observe(containerEl); }
        function extractYouTubeID(url) {
            if (!url) return null;
            const patterns = [/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/, /youtube\.com\/shorts\/([^&\n?#]+)/];
            for (let pattern of patterns) { const match = url.match(pattern); if (match && match[1]) return match[1]; }
            return null;
        }
        function getVideoThumbnail(videoUrl, providedThumbnail) {
            if (providedThumbnail && providedThumbnail.trim() !== "") return providedThumbnail;
            const videoId = extractYouTubeID(videoUrl);
            if (videoId) return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
            return "https://images.unsplash.com/photo-1581091226033-d5c48150dbaa?q=80&w=1200&auto=format&fit=crop";
        }
        async function loadYouTubeAPI() {
            if (window.YT && window.YT.Player) return Promise.resolve();
            return new Promise((resolve, reject) => {
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);
                window.onYouTubeIframeAPIReady = () => resolve();
                tag.onerror = reject;
            });
        }
        async function initYouTubePlayer(videoContainer, videoUrl, uniqueId) {
            if (!videoUrl) return;
            const videoId = extractYouTubeID(videoUrl);
            if (!videoId) { showToast("Invalid video URL", true); return; }
            if (videoContainer.dataset.playerInitialized === "true") return;
            videoContainer.dataset.playerInitialized = "true";
            await loadYouTubeAPI();
            videoContainer.innerHTML = '';
            const wrapper = document.createElement('div');
            wrapper.className = 'video-iframe-wrapper';
            wrapper.id = `youtube-player-${uniqueId}`;
            videoContainer.appendChild(wrapper);
            const player = new YT.Player(wrapper.id, {
                videoId: videoId,
                playerVars: { autoplay: 1, modestbranding: 1, rel: 0, controls: 1 },
                events: { onReady: () => { activePlayersMap.set(videoContainer, player); observeVideoContainer(videoContainer); } }
            });
            activePlayersMap.set(videoContainer, player);
        }

        function normalizePost(postData) {
            return {
                postId: postData.id || postData.postId || postData._id || crypto.randomUUID(),
                postTitle: postData.postTitle || postData.title || postData.name || "Untitled Post",
                postSubtle: postData.postSubtle || postData.description || postData.subtle || "",
                videoUrl: postData.videoUrl || postData.video || "",
                thumbnailUrl: postData.thumbnailUrl || postData.thumbnail || "",
                createdAt: postData.createdAt || postData.created_at || postData.timestamp || null,
                tutorName: postData.tutorName || postData.tutor_name || postData.tutor || "Not specified"
            };
        }

        function renderPosts(posts, append = false) {
            if (!append) clearPosts();
            if (!posts || posts.length === 0) {
                if (!append) postsContainer.innerHTML = '<div class="empty-posts-message">📭 No posts available.</div>';
                loadingIndicator.style.display = 'none';
                return;
            }
            const normalizedPosts = posts.map(normalizePost);
            normalizedPosts.forEach((post, idx) => postsContainer.appendChild(createPostCard(post, idx)));
            if (!append) { const mainEl = document.querySelector('main'); if (mainEl) mainEl.scrollTop = 0; }
        }

        function createPostCard(post, index) {
            const { postId, postTitle, postSubtle, videoUrl, thumbnailUrl, createdAt, tutorName } = post;
            const section = document.createElement('section');
            const titleEl = document.createElement('h2');
            titleEl.textContent = postTitle;
            titleEl.className = "text-3xl font-extrabold text-gray-900 mb-4 tracking-tight leading-tight uppercase title-underline";
            const descEl = document.createElement('p');
            descEl.textContent = postSubtle || "No additional details.";
            descEl.className = "text-lg text-gray-600 mb-3 font-normal opacity-90";
            const timeDisplay = document.createElement('div');
            timeDisplay.className = "timestamp-text";
            timeDisplay.textContent = formatCreatedAt(createdAt);
            const tutorDisplay = document.createElement('div');
            tutorDisplay.className = "tutor-info";
            tutorDisplay.textContent = `Tutor — ${tutorName}`;
            const hasValidVideo = videoUrl && videoUrl.trim() !== "";
            let mediaContainer;
            if (hasValidVideo) {
                mediaContainer = document.createElement('div');
                mediaContainer.className = "video-container";
                const thumbUrl = getVideoThumbnail(videoUrl, thumbnailUrl);
                const thumbImg = document.createElement('img');
                thumbImg.src = thumbUrl;
                thumbImg.alt = postTitle;
                thumbImg.className = "video-thumbnail";
                thumbImg.loading = "lazy";
                thumbImg.onerror = function() { this.src = "https://images.unsplash.com/photo-1581091226033-d5c48150dbaa?q=80&w=1200&auto=format&fit=crop"; };
                mediaContainer.appendChild(thumbImg);
                const svgPlay = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svgPlay.setAttribute("width", "90");
                svgPlay.setAttribute("height", "90");
                svgPlay.setAttribute("viewBox", "0 0 90 90");
                svgPlay.setAttribute("class", "play-button-overlay");
                svgPlay.innerHTML = '<path d="M85.3 24.5c-1-3.7-3.9-6.6-7.6-7.6C71 15 45 15 45 15s-26 0-32.7 1.9c-3.7 1-6.6 3.9-7.6 7.6C2.8 31.2 2.8 45 2.8 45s0 13.8 1.9 20.5c1 3.7 3.9 6.6 7.6 7.6C19 75 45 75 45 75s26 0 32.7-1.9c3.7-1 6.6-3.9 7.6-7.6 1.9-6.7 1.9-20.5 1.9-20.5s0-13.8-1.9-20.5z" fill="#3b82f6"/><path d="M36 58.5V31.5L59.5 45L36 58.5z" fill="white"/>';
                mediaContainer.appendChild(svgPlay);
                const uniqueVideoId = `vid_${Date.now()}_${index}_${Math.random().toString(36).substr(2, 6)}`;
                mediaContainer.dataset.videoUniqueId = uniqueVideoId;
                mediaContainer.dataset.videoUrl = videoUrl;
                mediaContainer.dataset.thumbnailUrl = thumbnailUrl || "";
                mediaContainer.dataset.postTitle = postTitle;
                mediaContainer.dataset.playerInitialized = "false";
                mediaContainer.addEventListener('click', (e) => {
                    e.stopPropagation();
                    destroyAllActivePlayersExcept(mediaContainer);
                    if (mediaContainer.dataset.playerInitialized !== "true") initYouTubePlayer(mediaContainer, videoUrl, mediaContainer.dataset.videoUniqueId).catch(console.warn);
                });
            } else {
                mediaContainer = document.createElement('div');
                mediaContainer.className = "aspect-16-9 bg-gray-100 rounded-lg overflow-hidden border border-gray-200 shadow-sm";
                const img = document.createElement('img');
                img.src = thumbnailUrl || "https://images.unsplash.com/photo-1505751172876-fa1923c5c528?q=80&w=1200&auto=format&fit=crop";
                img.alt = postTitle;
                img.className = "w-full h-full object-cover";
                img.loading = "lazy";
                img.onerror = function() { if (!this.src.includes('placeholder-medical')) this.src = "https://images.unsplash.com/photo-1581091226033-d5c48150dbaa?q=80&w=1200&auto=format&fit=crop"; };
                mediaContainer.appendChild(img);
            }
            section.appendChild(titleEl);
            section.appendChild(descEl);
            section.appendChild(timeDisplay);
            section.appendChild(tutorDisplay);
            section.appendChild(mediaContainer);
            return section;
        }

        // Pagination – now includes classId, subjectId, tutorId
        async function fetchPaginatedPosts(cursor = null, append = false) {
            if (isLoadingMore) return;
            if (!selectedClassId || !selectedSubjectId || !selectedTutorId) {
                showEmptyPostsMessage();
                return;
            }
            isLoadingMore = true;
            if (append) loadingIndicator.style.display = 'block';
            let url = `${API_BASE}/api/posts?classId=${encodeURIComponent(selectedClassId)}&subjectId=${encodeURIComponent(selectedSubjectId)}&tutorId=${encodeURIComponent(selectedTutorId)}&limit=${DEFAULT_LIMIT}`;
            if (cursor) url += `&cursor=${encodeURIComponent(cursor)}`;
            const data = await fetchJSON(url, "Failed to load posts");
            isLoadingMore = false;
            loadingIndicator.style.display = 'none';
            if (!data) { if (!append) showEmptyPostsMessage(); return; }
            const { data: posts, nextCursor, hasMore } = data;
            paginationCursor = nextCursor;
            hasMorePosts = hasMore;
            renderPosts(posts, append);
        }

        async function handleInfiniteScroll() {
            if (currentFeedMode !== 'paginated') return;
            if (!hasMorePosts || isLoadingMore) return;
            await fetchPaginatedPosts(paginationCursor, true);
        }

        let infiniteScrollObserver = null;
        function setupInfiniteScroll() {
            if (infiniteScrollObserver) infiniteScrollObserver.disconnect();
            infiniteScrollObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) handleInfiniteScroll(); });
            }, { root: document.querySelector('main'), rootMargin: '200px', threshold: 0.1 });
            if (scrollSentinel) infiniteScrollObserver.observe(scrollSentinel);
        }

        // Filtered posts (with chapter)
        async function fetchAndRenderFilteredPosts() {
            if (!selectedClassId || !selectedSubjectId || !selectedTutorId || !selectedChapterId) {
                if (currentFeedMode === 'filtered') resetToDefaultModeAndClearFilters();
                return;
            }
            currentFeedMode = 'filtered';
            destroyAllPlayers();
            postsContainer.innerHTML = '<div class="loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>';
            const url = `${API_BASE}/filter-posts?classId=${encodeURIComponent(selectedClassId)}&subjectId=${encodeURIComponent(selectedSubjectId)}&chapterId=${encodeURIComponent(selectedChapterId)}&tutorId=${encodeURIComponent(selectedTutorId)}`;
            const data = await fetchJSON(url, "Failed to load posts.");
            if (data && Array.isArray(data.data)) renderPosts(data.data);
else if (data && Array.isArray(data)) renderPosts(data);
else renderPosts([]);
        }

        // --- DROPDOWN POPULATION (chapter & tutor) ---
        async function populateChapterSelect(resetOnly = false) {
            const wrapperDiv = document.getElementById('chapterSelectWrapper');
            if (!wrapperDiv) return;
            if (!selectedClassId || !selectedSubjectId) {
                wrapperDiv.innerHTML = '';
                wrapperDiv.appendChild(buildCustomSelect([], 'Select Chapter', null, () => {}));
                return;
            }
            if (!resetOnly) wrapperDiv.innerHTML = '<div class="loader" style="padding:0.5rem"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>';
            const data = await fetchJSON(`${API_BASE}/chapters?classId=${encodeURIComponent(selectedClassId)}&subjectId=${encodeURIComponent(selectedSubjectId)}`, "Failed to load chapters");
            let options = [];
            if (data && Array.isArray(data)) options = data.map(c => ({ value: c.chapterId || c.id, label: c.chapterName || c.name }));
            const selectComponent = buildCustomSelect(options, 'Select Chapter', selectedChapterId, async (chapterId, chapterName) => {
                if (currentFeedMode === 'filtered') resetToDefaultModeAndClearFilters();
                selectedChapterId = chapterId;
                // Chapter changed → load filtered posts immediately (tutor already set)
                await fetchAndRenderFilteredPosts();
            });
            wrapperDiv.innerHTML = '';
            wrapperDiv.appendChild(selectComponent);
        }

        async function populateTutorSelect(resetOnly = false) {
            const wrapperDiv = document.getElementById('tutorSelectWrapper');
            if (!wrapperDiv) return;
            if (!selectedClassId || !selectedSubjectId) {
                wrapperDiv.innerHTML = '';
                wrapperDiv.appendChild(buildCustomSelect([], 'Select Tutor', null, () => {}));
                return;
            }
            if (!resetOnly) wrapperDiv.innerHTML = '<div class="loader" style="padding:0.5rem"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>';
            // Fetch tutors for class & subject (independent of chapter)
            const data = await fetchJSON(`${API_BASE}/tutors?classId=${encodeURIComponent(selectedClassId)}&subjectId=${encodeURIComponent(selectedSubjectId)}`, "Failed to load tutors");
            let options = [];
            if (data && Array.isArray(data)) options = data.map(t => ({ value: t.tutorId || t.id, label: t.tutorName || t.name }));
            
            // Pre‑select tutor from URL if present and not already selected
            if (!selectedTutorId && options.length > 0) {
                // Fallback: if URL tutorId not found, use first? Better to keep null and show empty.
                // But we already have selectedTutorId from URL.
            }

            const selectComponent = buildCustomSelect(options, 'Select Tutor', selectedTutorId, async (tutorId, tutorName) => {
                selectedTutorId = tutorId;
                selectedChapterId = null;   // reset chapter when tutor changes
                currentFeedMode = 'paginated';
                paginationCursor = null;
                hasMorePosts = false;
                destroyAllPlayers();
                clearPosts();
                postsContainer.innerHTML = '<div class="loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>';
                await fetchPaginatedPosts(null, false);
                // Refresh chapter dropdown (options remain same, but selected chapter cleared)
                await populateChapterSelect(true);
            });
            wrapperDiv.innerHTML = '';
            wrapperDiv.appendChild(selectComponent);
        }

        // --- BUILD FILTER UI (only chapter and tutor) ---
        async function buildFilterUI() {
            if (!filterContainer) return;
            filterContainer.innerHTML = '';
            
            // Chapter label and wrapper
            const chapterLabel = document.createElement('label');
            chapterLabel.className = 'form-label';
            chapterLabel.textContent = 'SELECT CHAPTER';
            filterContainer.appendChild(chapterLabel);
            const chapterWrapper = document.createElement('div');
            chapterWrapper.id = 'chapterSelectWrapper';
            filterContainer.appendChild(chapterWrapper);
            
            // Tutor label and wrapper
            const tutorLabel = document.createElement('label');
            tutorLabel.className = 'form-label';
            tutorLabel.textContent = 'SELECT TUTOR';
            filterContainer.appendChild(tutorLabel);
            const tutorWrapper = document.createElement('div');
            tutorWrapper.id = 'tutorSelectWrapper';
            filterContainer.appendChild(tutorWrapper);
            
            await Promise.all([populateTutorSelect(), populateChapterSelect()]);
        }

        // ---------- SMART HEADER (FIXED GAP ON REVEAL) ----------
        function initSmartHeader() {
            const header = document.querySelector('header');
            const mainElement = document.querySelector('main');
            if (!header || !mainElement) return;
            
            // Helper to set main's padding-top exactly to header height
            const updateHeaderPadding = () => {
                const headerHeight = header.offsetHeight;
                mainElement.style.paddingTop = headerHeight + 'px';
            };

            // Initial call
            updateHeaderPadding();

            let lastScrollTop = 0;
            let ticking = false;

            function handleMainScroll() {
                const currentScrollTop = mainElement.scrollTop;
                if (currentScrollTop > lastScrollTop && currentScrollTop > 30) {
                    header.classList.add('header-hidden');
                } else if (currentScrollTop < lastScrollTop && currentScrollTop >= 0) {
                    header.classList.remove('header-hidden');
                }
                if (currentScrollTop === 0) {
                    header.classList.remove('header-hidden');
                }
                lastScrollTop = currentScrollTop;
                ticking = false;
            }

            function onMainScroll() {
                if (!ticking) {
                    requestAnimationFrame(handleMainScroll);
                    ticking = true;
                }
            }

            mainElement.addEventListener('scroll', onMainScroll);
            window.addEventListener('resize', updateHeaderPadding);

            // Observe header size changes (e.g., orientation change)
            if (window.ResizeObserver) {
                new ResizeObserver(updateHeaderPadding).observe(header);
            }
        }

        // ======================== AUTH & INIT ========================
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                // Not logged in → redirect to auth1.html
                window.location.href = 'auth1.html';
                return;
            }

            // User is authenticated – proceed with app initialisation
            try {
                // Pre‑fetch token to ensure it's valid
                await user.getIdToken();
            } catch (e) {
                window.location.href = 'auth1.html';
                return;
            }

            // Initialise UI and data
            initSmartHeader();
setupInfiniteScroll();

currentFeedMode = 'paginated';
postsContainer.innerHTML = '<div class="loader">...</div>';

// Run UI build and posts fetch in parallel
const tasks = [buildFilterUI()];
if (selectedClassId && selectedSubjectId && selectedTutorId) {
    tasks.push(fetchPaginatedPosts(null, false));
} else {
    showEmptyPostsMessage();
}

await Promise.all(tasks);

initialDataLoaded = true;
checkHideLoadingOverlay();
        });

        // In case auth state takes time, we already have loading overlay visible.
        // The observer above will run when auth state is known.
    </script>
