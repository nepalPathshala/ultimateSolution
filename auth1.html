<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultimate Solution | Auth</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Creepster&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC6NRjkwiazA-aYF4okvnLW4qpCyMg8O9E",
            authDomain: "fir-f3d53.firebaseapp.com",
            databaseURL: "https://fir-f3d53-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fir-f3d53",
            storageBucket: "fir-f3d53.firebasestorage.app",
            messagingSenderId: "683707045028",
            appId: "1:683707045028:web:93990fa0de8767dda90231"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
window.db = db;
window.doc = doc;
window.setDoc = setDoc;
        window.auth = auth;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.updateProfile = updateProfile;
        window.sendEmailVerification = sendEmailVerification;
        window.signOut = signOut;
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden !important;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8fafc;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: pan-y pinch-zoom;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: background-color 0.2s ease;
        }
        main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        main::-webkit-scrollbar {
            display: none;
        }
        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        .custom-file-upload {
            border: 2px dashed #cbd5e1;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background-color: rgba(255,255,255,0.4);
            backdrop-filter: blur(2px);
        }
        .custom-file-upload:hover {
            border-color: #6366f1;
            background-color: rgba(99, 102, 241, 0.05);
        }
        #profilePreview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn-loading {
            pointer-events: none;
            opacity: 0.7;
        }
        .toast-notification {
            transition: opacity 0.25s ease-in-out, visibility 0.25s;
            opacity: 0;
            visibility: hidden;
            backdrop-filter: blur(4px);
            z-index: 999;
        }
        .toast-notification.show {
            opacity: 1;
            visibility: visible;
        }

        /* LINE-STYLED LABELS */
        .form-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            margin-top: 8px;
            letter-spacing: 0.5px;
            width: 100%;
        }
        .form-label::before,
        .form-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #94a3b8;
        }
        .form-label::before {
            margin-right: 12px;
        }
        .form-label::after {
            margin-left: 12px;
        }

        .auth-section {
            background: transparent;
            backdrop-filter: none;
            box-shadow: none;
            border: none;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0b1120;
                color: #e2e8f0;
            }
            .form-label {
                color: #cbd5e6;
            }
            .form-label::before,
            .form-label::after {
                background-color: #475569;
            }
            input, .custom-select-trigger {
                background-color: rgba(30, 41, 59, 0.7);
                border-color: #334155;
                color: #f1f5f9;
                backdrop-filter: blur(4px);
            }
            .custom-file-upload {
                background-color: rgba(30, 41, 59, 0.5);
                border-color: #475569;
                backdrop-filter: blur(4px);
            }
            .text-gray-700, .text-gray-800 {
                color: #e2e8f0 !important;
            }
            .text-gray-500 {
                color: #94a3b8 !important;
            }
        }
    </style>
</head>
<body>
    <main class="w-full max-w-6xl mx-auto px-4 py-8">
        <!-- Brand Logo -->
        <div class="mb-6">
            <img src="https://i.postimg.cc/bw2vK1BT/Blue_Minimalist.png" alt="Brand Logo" class="w-full h-auto object-contain rounded-xl" onerror="this.style.display='none'">
        </div>

        <!-- LOGIN + REGISTER CONTAINER -->
        <div id="loginRegisterContainer" class="flex flex-col gap-6">
            <!-- SIGN IN Section -->
            <section id="signInSection" class="auth-section w-full p-6 md:p-8">
                <h2 class="text-2xl font-semibold text-gray-800 dark:text-gray-200 mb-6 flex items-center">
                    <span class="w-2 h-8 bg-indigo-500 rounded-full mr-3"></span>
                    SIGN IN
                </h2>
                <form id="loginForm" class="space-y-5 w-full">
                    <div>
                        <div class="form-label">ENTER EMAIL</div>
                        <input type="email" id="loginEmail" placeholder="--Enter Email--" class="w-full px-4 py-3 rounded-lg bg-white/40 dark:bg-slate-800/40 backdrop-blur-sm border border-gray-200 dark:border-slate-600 text-sm" required>
                    </div>
                    <div>
                        <div class="form-label">ENTER PASSWORD</div>
                        <input type="password" id="loginPassword" placeholder="--Enter Password--" class="w-full px-4 py-3 rounded-lg bg-white/40 dark:bg-slate-800/40 backdrop-blur-sm border border-gray-200 dark:border-slate-600 text-sm" required>
                    </div>
                    <button type="submit" id="loginBtn" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition duration-200 shadow-md flex items-center justify-center">
                        SIGN IN
                    </button>
                    <div class="text-center mt-6">
                        <button type="button" id="showSignUpBtn" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 text-sm font-medium underline underline-offset-4 transition">
                            Get Started →
                        </button>
                    </div>
                </form>
            </section>

            <!-- SIGN UP Section -->
            <section id="signUpSection" class="auth-section w-full p-6 md:p-8 hidden">
                <h2 class="text-2xl font-semibold text-gray-800 dark:text-gray-200 mb-6 flex items-center">
                    <span class="w-2 h-8 bg-emerald-500 rounded-full mr-3"></span>
                    SIGN UP
                </h2>
                <form id="registerForm" class="space-y-4 w-full">
                    <div>
                        <div class="form-label">USER NAME</div>
                        <input type="text" id="regName" placeholder="--Enter User Name--" class="w-full px-4 py-3 rounded-lg bg-white/40 dark:bg-slate-800/40 backdrop-blur-sm border border-gray-200 dark:border-slate-600 text-sm" required>
                    </div>
                    <div>
                        <div class="form-label">ENTER EMAIL</div>
                        <input type="email" id="regEmail" placeholder="--Enter Email--" class="w-full px-4 py-3 rounded-lg bg-white/40 dark:bg-slate-800/40 backdrop-blur-sm border border-gray-200 dark:border-slate-600 text-sm" required>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <div class="form-label">SET PASSWORD</div>
                            <input type="password" id="regPassword" placeholder="--Set Password--" class="w-full px-4 py-3 rounded-lg bg-white/40 dark:bg-slate-800/40 backdrop-blur-sm border border-gray-200 dark:border-slate-600 text-sm" required>
                        </div>
                        <div>
                            <div class="form-label">RE—ENTER PASSWORD</div>
                            <input type="password" id="regConfirmPassword" placeholder="--Re—Enter Password--" class="w-full px-4 py-3 rounded-lg bg-white/40 dark:bg-slate-800/40 backdrop-blur-sm border border-gray-200 dark:border-slate-600 text-sm" required>
                        </div>
                    </div>
                    <div>
                        <div class="form-label">UPLOAD PROFILE PHOTO</div>
                        <label class="custom-file-upload flex flex-col items-center justify-center w-full h-32 rounded-lg cursor-pointer">
                            <img id="profilePreview" src="#" alt="Preview">
                            <div id="uploadPlaceholder" class="flex flex-col items-center justify-center pt-5 pb-6">
                                <svg class="w-8 h-8 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                </svg>
                                <p class="text-xs text-gray-500 dark:text-gray-400 text-center px-2" id="file-name">--Upload Profile Photo--</p>
                            </div>
                            <input type="file" class="hidden" accept="image/*" id="imageInput">
                        </label>
                    </div>
                    <button type="submit" id="registerBtn" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg transition duration-200 shadow-md flex items-center justify-center">
                        SIGN UP
                    </button>
                    <div class="text-center mt-4">
                        <button type="button" id="backToLoginBtn" class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 underline underline-offset-4 transition">
                            ← Back to Login
                        </button>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="customToast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 md:left-auto md:right-6 md:translate-x-0 z-50 toast-notification bg-gradient-to-r from-red-600 to-red-700 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 font-semibold text-base border border-red-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span id="toastMessage">Message</span>
    </div>

    <script>
        // Helper: Toast
        function showToast(message, isError = true) {
            const toast = document.getElementById('customToast');
            const msgSpan = document.getElementById('toastMessage');
            if (!toast) return;
            msgSpan.innerText = message;
            if (isError) {
                toast.classList.remove('bg-gradient-to-r', 'from-green-600', 'to-green-700', 'border-green-400');
                toast.classList.add('bg-gradient-to-r', 'from-red-600', 'to-red-700', 'border-red-400');
            } else {
                toast.classList.remove('bg-gradient-to-r', 'from-red-600', 'to-red-700', 'border-red-400');
                toast.classList.add('bg-gradient-to-r', 'from-green-600', 'to-green-700', 'border-green-400');
            }
            toast.classList.remove('show');
            void toast.offsetWidth;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function setButtonLoading(btn, isLoading) {
            if (isLoading) {
                btn.classList.add('btn-loading');
                btn.disabled = true;
                const originalText = btn.innerText;
                btn.setAttribute('data-original-text', originalText);
                btn.innerHTML = `${originalText} <span class="loader"></span>`;
            } else {
                btn.classList.remove('btn-loading');
                btn.disabled = false;
                const original = btn.getAttribute('data-original-text');
                if (original) btn.innerText = original;
            }
        }
        
        // DOM elements (only those remaining)
        const loginRegisterContainer = document.getElementById('loginRegisterContainer');
        const signInSection = document.getElementById('signInSection');
        const signUpSection = document.getElementById('signUpSection');
        const showSignUpBtn = document.getElementById('showSignUpBtn');
        const backToLoginBtn = document.getElementById('backToLoginBtn');
        
        // ======================== EVENT LISTENERS ========================
        showSignUpBtn.addEventListener('click', () => {
            signInSection.classList.add('hidden');
            signUpSection.classList.remove('hidden');
        });
        
        backToLoginBtn.addEventListener('click', () => {
            signUpSection.classList.add('hidden');
            signInSection.classList.remove('hidden');
        });
        
        // Login handler
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) {
                showToast('Please fill all fields');
                return;
            }
            setButtonLoading(loginBtn, true);
            try {
                const userCredential = await window.signInWithEmailAndPassword(window.auth, email, password);
                const user = userCredential.user;
                if (!user.emailVerified) {
                    showToast('Please verify your email before logging in. Check your inbox.');
                    setButtonLoading(loginBtn, false);
                    return;
                }
                // Save session to Firestore then redirect
                try {
                    await user.getIdToken(true);
                    const sessionId = crypto.randomUUID();
                    localStorage.setItem('sessionId', sessionId);
                    localStorage.setItem('uid', user.uid);
                    await window.setDoc(
                        window.doc(window.db, 'users', user.uid),
                        { sessionId }
                    );
                } catch(e) {
                    console.warn('Session save error:', e.message);
                }
                setButtonLoading(loginBtn, false);
                window.location.href = 'freeSolution.html';
            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (msg.includes('auth/user-not-found')) msg = 'User not found';
                else if (msg.includes('auth/wrong-password')) msg = 'Wrong password';
                else if (msg.includes('auth/invalid-email')) msg = 'Invalid email';
                else msg = 'Login failed. Try again.';
                showToast(msg);
                setButtonLoading(loginBtn, false);
            }
        });
        
        // Registration handlers (unchanged)
        const imageInput = document.getElementById('imageInput');
        const profilePreview = document.getElementById('profilePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const fileNameSpan = document.getElementById('file-name');
        
        imageInput.addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                if (file.size > 5 * 1024 * 1024) {
                    showToast('Image too large (max 5MB)');
                    this.value = '';
                    return;
                }
                fileNameSpan.textContent = file.name;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    profilePreview.src = ev.target.result;
                    profilePreview.style.display = 'block';
                    uploadPlaceholder.style.opacity = '0.3';
                };
                reader.readAsDataURL(file);
            } else {
                fileNameSpan.textContent = '--Upload Profile Photo--';
                profilePreview.style.display = 'none';
                uploadPlaceholder.style.opacity = '1';
            }
        });
        
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const userName = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            if (!userName || !email || !password || !confirmPassword) {
                showToast('All fields are required');
                return;
            }
            if (password !== confirmPassword) {
                showToast('Passwords do not match');
                return;
            }
            if (password.length < 6) {
                showToast('Password must be at least 6 characters');
                return;
            }
            setButtonLoading(registerBtn, true);
            try {
                const userCredential = await window.createUserWithEmailAndPassword(window.auth, email, password);
                const user = userCredential.user;
                await window.updateProfile(user, { displayName: userName });
                await window.sendEmailVerification(user);
                await window.signOut(window.auth);
                showToast('Account created! Verification email sent. Please verify then sign in.', false);
                registerForm.reset();
                imageInput.value = '';
                profilePreview.style.display = 'none';
                uploadPlaceholder.style.opacity = '1';
                fileNameSpan.textContent = '--Upload Profile Photo--';
                setButtonLoading(registerBtn, false);
                signUpSection.classList.add('hidden');
                signInSection.classList.remove('hidden');
                setTimeout(() => {
                    showToast('After email verification, use SIGN IN to continue.', false);
                }, 2000);
            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (msg.includes('auth/email-already-in-use')) msg = 'Email already registered';
                else if (msg.includes('auth/weak-password')) msg = 'Weak password (min 6 chars)';
                else msg = 'Registration failed. Try again.';
                showToast(msg);
                setButtonLoading(registerBtn, false);
            }
        });
        
        // Initial UI state
        signInSection.classList.remove('hidden');
        signUpSection.classList.add('hidden');
    </script>
</body>
</html>
